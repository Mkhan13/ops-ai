name: Data Quality Check

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  push:
    branches: [main]
    paths:
      - 'week3/data/**'
      - 'week3/validation/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow numpy

      - name: Run data quality validation
        id: validate
        run: |
          cd week3
          python3 -c "
          import sys
          import pandas as pd
          from validation.check_data_quality import DataQualityValidator

          CUTOFF = pd.Timestamp('2026-01-16')
          df = pd.read_parquet('data/demand_enriched_corrupted.parquet')
          baseline = df[df['time_bucket'] < CUTOFF]
          corrupted = df[df['time_bucket'] >= CUTOFF]

          print(f'Baseline rows: {len(baseline)}, Corrupted rows: {len(corrupted)}')

          validator = DataQualityValidator(baseline_df=baseline)
          result = validator.validate(corrupted)

          print(f'Issues found: {result[\"num_issues\"]}')
          for issue in result['issues']:
              print(f'  [{issue[\"severity\"].upper()}] {issue[\"type\"]}: {issue[\"description\"]}')

          if not result['is_valid']:
              print('Data validation FAILED — blocking deployment')
              sys.exit(1)
          else:
              print('Data validation PASSED')
          "

      - name: Block deployment if validation fails
        if: failure()
        run: |
          echo "Data validation FAILED"
          echo "Check logs above for issues"
          exit 1

      - name: Validation passed
        if: success()
        run: echo "Data quality validation passed"
